{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "globex-store-mcp.serviceAccountName" . }}
  labels:
    {{- include "globex-store-mcp.labels" . | nindent 4 }}
  annotations:
    {{- include "globex-store-mcp.argocd-syncwave" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }} 
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
