apiVersion: v1
kind: Secret
metadata:
  name: {{ include "globex-store-mcp.name" . }}
  labels:
    {{- include "globex-store-mcp.labels" . | nindent 4 }}
  annotations:
    {{- include "globex-store-mcp.argocd-syncwave" . | nindent 4 }}
type: "Opaque"
stringData:
  application.properties: |-

    quarkus.otel.exporter.otlp.endpoint={{ .Values.otel.exporter.endpoint }}
    quarkus.otel.exporter.otlp.metrics.endpoint={{ .Values.otel.exporter.endpoint }}


    # added 16/April

    org.globex.mcp.store.service.GlobexStoreApi/mp-rest/url={{ .Values.globexStore.url }}

    quarkus.oidc.auth-server-url={{ .Values.internalOidc.authServerUrl }}/realms/{{ .Values.internalOidc.realm }}

    # Default Quarkus OIDC tenant that verifies access tokens which reach the MCP server.

    quarkus.oidc.client-id={{ .Values.internalOidc.storeMcp.clientId }}
    quarkus.oidc.token.audience={{ .Values.internalOidc.storeMcp.audience }}

    # Request a token exchange before the token propagation
    quarkus.rest-client-oidc-token-propagation.exchange-token=true

    quarkus.oidc-client.auth-server-url={{ .Values.internalOidc.authServerUrl }}/realms/{{ .Values.internalOidc.realm }}

    quarkus.oidc-client.client-id={{ .Values.internalOidc.storeApp.clientId }}
    quarkus.oidc-client.credentials.secret={{ .Values.internalOidc.storeApp.clientSecret }}
    quarkus.oidc-client.scopes={{ .Values.internalOidc.storeApp.scope }}

    quarkus.oidc-client.grant.type=exchange

    quarkus.oidc-client.grant-options.exchange.requested_token_type=urn:ietf:params:oauth:token-type:access_token



    # Secure MCP endpoints
    quarkus.http.auth.permission.mcp.paths=/mcp/*
    quarkus.http.auth.permission.mcp.policy=authenticated

    quarkus.http.cors.enabled=true
    quarkus.http.cors.origins= *
    quarkus.http.cors.methods=GET,POST,DELETE,OPTIONS

