namespace: keycloak

keycloak:
  name: keycloak

realm:
  name: internal

hook:
  image:
    repository: quay.io/cloud-architecture-workshop/wait-for-statefulset-job
    pullPolicy: IfNotPresent
    tag: "1c68180"
  serviceAccount:
    create: true
    name: ""
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  maxTimeToWait: 120000

clients:
  complaintsClient:
    id:
    secret:
  mcpClient:
    id:
    secret:
    scope:
  mcpServer:
    id:
    secret:
    scope:
  mcpService:
    id:
    secret:
    scope:


groups: []

roles: []

argocd:
  enabled: true
  syncwave: "-2"

