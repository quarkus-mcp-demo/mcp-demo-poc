namespace:

keycloak:
  name: keycloak

realm:
  name: internalv2

hook:
  image:
    repository: quay.io/cloud-architecture-workshop/wait-for-statefulset-job
    pullPolicy: IfNotPresent
    tag: "1c68180"
  serviceAccount:
    create: true
    name: ""
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  maxTimeToWait: 120000

clients:
  complaintsClient:
    name:
    secret:
  storeMcpClient:
    name:
    secret:
  storeAppClient:
    name:
    secret:


groups: []

roles: []

argocd:
  enabled: true
  syncwave: "-2"

